name: Twitter Research Trends

on:
  workflow_dispatch:
  schedule:
    - cron: '20 8 * * *' 

jobs:
  sync-twitter-research-trends:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TWITTERAPI_API_KEY: ${{ secrets.TWITTERAPI_API_KEY }}
          TWITTER_RESEARCH_LIST_ID: ${{ secrets.TWITTER_RESEARCH_LIST_ID }}
        run: |
          node -e "const required = ['MONGODB_URI','TWITTERAPI_API_KEY','TWITTER_RESEARCH_LIST_ID']; const missing = required.filter((key) => !process.env[key] || !String(process.env[key]).trim()); if (missing.length) { console.error('Missing required GitHub secrets: ' + missing.join(', ')); process.exit(1); } try { const uri = new URL(process.env.MONGODB_URI); console.log('Using MongoDB host:', uri.hostname); } catch (error) { console.error('MONGODB_URI is not a valid URI'); process.exit(1); }"

      - name: Run Twitter research trends sync
        run: npm run sync:twitter:research
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TWITTERAPI_API_KEY: ${{ secrets.TWITTERAPI_API_KEY }}
          TWITTERAPI_BASE_URL: https://api.twitterapi.io
          TWITTER_RESEARCH_LIST_ID: ${{ secrets.TWITTER_RESEARCH_LIST_ID }}
