name: Twitter Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  sync-twitter-history:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Twitter sync
        run: npm run sync:twitter
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TWITTERAPI_API_KEY: ${{ secrets.TWITTERAPI_API_KEY }}
          TWITTERAPI_BASE_URL: https://api.twitterapi.io
          TWITTER_SYNC_USERS: ${{ secrets.TWITTER_SYNC_USERS }}
          TWITTER_TRACKING_WINDOW_DAYS: ${{ secrets.TWITTER_TRACKING_WINDOW_DAYS }}
