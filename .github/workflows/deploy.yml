name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          envs: DEPLOY_PATH
          script: |
            set -eu
            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main      # mirror repo; .env untracked so it survives
            docker compose up --build -d
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
